name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI, npm, and GHCR'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Validate
        run: |
          uv run ruff check .
          uv run pytest -q
          uv run python -m compileall seam main.py scripts/benchmark.py
      - name: Build Python package
        run: uv build
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - name: Publish to PyPI
        if: inputs.publish == 'true'
        run: uv publish

  build-npm-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Pack npm skill installer
        working-directory: npm/seam-skill
        run: npm pack --dry-run
      - name: Publish npm skill installer
        if: inputs.publish == 'true'
        working-directory: npm/seam-skill
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  github-release:
    runs-on: ubuntu-latest
    needs: [build-python, build-npm-skill]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
