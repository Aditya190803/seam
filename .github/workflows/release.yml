name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI and npm'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Validate
        run: |
          uv run ruff check .
          uv run pytest -q
          uv run python -m compileall seam main.py scripts/benchmark.py
      - name: Build Python package
        run: uv build
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.publish == 'true'
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if python - "$PACKAGE_VERSION" <<'PY'
          import json
          import sys
          import urllib.request

          version = sys.argv[1]
          with urllib.request.urlopen("https://pypi.org/pypi/seam-index/json", timeout=30) as response:
              data = json.load(response)

          raise SystemExit(0 if version in data.get("releases", {}) else 1)
          PY
          then
            echo "seam-index@${PACKAGE_VERSION} already exists on PyPI; skipping publish."
          else
            uv publish
          fi

  build-npm-skill:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Pack npm skill installer
        working-directory: npm/seam-skill
        run: npm pack --dry-run
      - name: Publish npm skill installer
        if: (github.event_name == 'push' || inputs.publish == 'true') && env.NODE_AUTH_TOKEN != ''
        working-directory: npm/seam-skill
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            npm publish --access public
          fi

  github-release:
    runs-on: ubuntu-latest
    needs: [build-python, build-npm-skill]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
