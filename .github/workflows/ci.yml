name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Run tests
        run: uv run pytest -q
      - name: Validate installer
        run: |
          bash -n scripts/install.sh
          node npm/seam-skill/bin/seam-skill.js install --dry-run
      - name: Pack npm skill installer
        working-directory: npm/seam-skill
        run: npm pack --dry-run
      - name: Compile
        run: uv run python -m compileall seam main.py scripts/benchmark.py
      - name: Build package
        run: uv build
      - name: CLI smoke test
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/repo"
          printf 'def validate_jwt(token):\n    return token == "ok"\n' > "$tmp/repo/auth.py"
          SEAM_HOME="$tmp/home" uv run seam init "$tmp/repo"
          SEAM_HOME="$tmp/home" uv run seam search --json --path "$tmp/repo" jwt validation
